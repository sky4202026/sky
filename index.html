<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>风湿科评分工具</title>

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="风湿评分">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3B6CB8">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233B6CB8'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='52' font-weight='bold'>R</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====== 顶部导航栏 ====== -->
  <header class="app-header" id="appHeader">
    <button class="nav-btn" id="btnBack" style="visibility:hidden" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="24" height="24"><path stroke-linecap="round" d="M15 5L7 12l8 7"/></svg>
    </button>
    <h1 class="app-title" id="appTitle">风湿科评分工具</h1>
    <button class="nav-btn" id="btnReset" style="visibility:hidden" aria-label="重置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><path stroke-linecap="round" d="M4 4v6h6M20 20v-6h-6"/><path stroke-linecap="round" d="M20 12a8 8 0 11-3.2-6.4"/></svg>
    </button>
  </header>

  <!-- ====== 主内容区 ====== -->
  <main class="app-main" id="appMain">
    <!-- 由 app.js 动态渲染 -->
  </main>

  <!-- ====== JS 脚本 ====== -->
  <script src="js/engine.js"></script>
  <script src="js/data-criteria.js"></script>
  <script src="js/data-scores.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
